<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REMOTE CCTV</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

.container{
  margin-top:100px;
}

button{
  width:260px;
  padding:20px;
  margin:15px;
  font-size:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.cam{
  background:green;
  color:white;
}

.view{
  background:blue;
  color:white;
}
</style>
</head>

<body>

<div class="container">

  <h1>📡 REMOTE CCTV SYSTEM</h1>

  <button class="cam" onclick="goCamera()">
    📷 CAMERA DEVICE
  </button>

  <br>

  <button class="view" onclick="goViewer()">
    📺 VIEW CAMERA
  </button>

</div>

<script>
function goCamera(){
  location.href = "camera.html";
}

function goViewer(){
  location.href = "viewer.html";
}
</script>

</body>
</html>
