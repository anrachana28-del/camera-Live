<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Camera Device</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

video{
  width:100%;
  max-width:500px;
  margin-top:10px;
  border-radius:10px;
}

input{
  padding:10px;
  font-size:18px;
}

button{
  padding:10px 20px;
  font-size:18px;
  cursor:pointer;
}

#status{
  color:lime;
}
</style>
</head>

<body>

<h2>📷 CAMERA DEVICE</h2>

<input id="cameraId" placeholder="cam1">

<button onclick="startCamera()">
START CAMERA
</button>

<h3 id="status">
🔴 No Viewer
</h3>

<video id="localVideo" autoplay playsinline muted></video>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let peer;
let stream;

/* ================= START CAMERA ================= */

async function startCamera(){

  try{

    const cameraId =
      document.getElementById("cameraId").value;

    if(!cameraId){
      alert("Enter camera ID");
      return;
    }

    socket.emit("camera-join", cameraId);

    stream =
      await navigator.mediaDevices.getUserMedia({
        video:true,
        audio:false
      });

    document.getElementById("localVideo")
      .srcObject = stream;

    peer = new RTCPeerConnection({
      iceServers:[
        {
          urls:"stun:stun.l.google.com:19302"
        }
      ]
    });

    stream.getTracks().forEach(track => {
      peer.addTrack(track, stream);
    });

    peer.onicecandidate = e => {

      if(e.candidate){

        socket.emit("signal",{
          cameraId,
          candidate:e.candidate
        });

      }

    };

    const offer =
      await peer.createOffer();

    await peer.setLocalDescription(offer);

    socket.emit("signal",{
      cameraId,
      offer
    });

    /* RECEIVE ANSWER */

    socket.on("signal", async data => {

      if(data.answer){

        await peer.setRemoteDescription(
          new RTCSessionDescription(data.answer)
        );

      }

      if(data.candidate){

        try{
          await peer.addIceCandidate(
            new RTCIceCandidate(data.candidate)
          );
        }catch(err){}
      }

    });

    /* VIEWER STATUS */

    socket.on("viewer-status", data => {

      if(data.online){

        document.getElementById("status")
          .innerHTML =
          "🟢 Viewer Connected (" + data.count + ")";

      }else{

        document.getElementById("status")
          .innerHTML =
          "🔴 No Viewer";

      }

    });

  }catch(err){

    console.error(err);

    alert(err.message);

  }

}
</script>

</body>
</html>
