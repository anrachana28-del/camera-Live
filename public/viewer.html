<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Viewer</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  text-align:center;
  font-family:Arial;
}

video{
  width:100%;
  max-width:700px;
  margin-top:10px;
  border-radius:10px;
  background:black;
}

input{
  padding:10px;
  font-size:18px;
}

button{
  padding:10px 20px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>📺 VIEW CAMERA</h2>

<input id="cameraId" placeholder="cam1">

<button onclick="startViewer()">
CONNECT
</button>

<br><br>

<video id="remoteVideo" autoplay playsinline controls></video>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let peer;

/* ================= START VIEWER ================= */

function startViewer(){

  const cameraId =
    document.getElementById("cameraId").value;

  if(!cameraId){
    alert("Enter camera ID");
    return;
  }

  socket.emit("viewer-join", cameraId);

  peer = new RTCPeerConnection({
    iceServers:[
      {
        urls:"stun:stun.l.google.com:19302"
      }
    ]
  });

  /* RECEIVE VIDEO */

  peer.ontrack = e => {

    document.getElementById("remoteVideo")
      .srcObject = e.streams[0];

  };

  /* SEND ICE */

  peer.onicecandidate = e => {

    if(e.candidate){

      socket.emit("signal",{
        cameraId,
        candidate:e.candidate
      });

    }

  };

  /* RECEIVE SIGNAL */

  socket.on("signal", async data => {

    if(data.offer){

      await peer.setRemoteDescription(
        new RTCSessionDescription(data.offer)
      );

      const answer =
        await peer.createAnswer();

      await peer.setLocalDescription(answer);

      socket.emit("signal",{
        cameraId,
        answer
      });

    }

    if(data.candidate){

      try{
        await peer.addIceCandidate(
          new RTCIceCandidate(data.candidate)
        );
      }catch(err){}
    }

  });

}
</script>

</body>
</html>
